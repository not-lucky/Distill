# MkDocs configuration for Distill
# Builds the project's user/dev documentation site with Material for MkDocs.
# The auto-generated reference (signals: automated_doc_generation) lives
# under docs/api/ and is rendered by mkdocstrings from Python/JS source.
site_name: Distill
site_description: Orchestrated parallel flashcard generation for Anki
site_url: https://not-lucky.github.io/Distill/
repo_url: https://github.com/not-lucky/Distill
repo_name: not-lucky/Distill
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: table
            heading_level: 2
            filters: ['!^_']

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Runbooks:
      - Overview: runbooks/index.md
      - Compilation failure: runbooks/compilation-failure.md
      - Schema drift: runbooks/schema-drift.md
      - API key rotation: runbooks/api-key-rotation.md
      - Database corruption: runbooks/database-corruption.md
      - Resume loop: runbooks/resume-loop.md
  - Reference:
      - Card schema: reference/card-schema.md
      - Stage 3 JSON contract: reference/stage3-json.md
  - API docs: api/compile.md
  - Development: development.md
  - Changelog: changelog.md
